name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # ✅ FIX: no spaces around '='
      - name: Create .env file
        run: |
          echo "VITE_SERVER_URI=${{ secrets.VITE_SERVER_URI }}" >> .env
          echo "VITE_GOOGLE_ID=${{ secrets.VITE_GOOGLE_ID }}" >> .env

      - name: Build project
        run: npm run build

      # ✅ Upload to temp (NO permission issues)
      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist"
          target: "/home/ubuntu/frontend-temp"

      # ✅ Move contents safely using sudo
      - name: Deploy to Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Deploying..."

            # clean old files
            sudo rm -rf /var/www/frontend/*

            # copy ONLY contents (not dist folder)
            sudo cp -r /home/ubuntu/frontend-temp/dist/* /var/www/frontend/

            # cleanup temp
            rm -rf /home/ubuntu/frontend-temp

            # reload nginx
            sudo nginx -t
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"
